[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
# Tests mint the full 9,800 public allocation in single calls; default 2^30 is too low.
gas_limit = "18446744073709551615"
# Renderer snapshot tests write decoded SVGs; preview generation writes the owner
# gallery's data URIs (agent 2 — flagged to overseer as a shared-file addition).
fs_permissions = [
    {access = "read", path = "assets"},
    {access = "read-write", path = "test/snapshots"},
    {access = "read-write", path = "assets/previews"},
]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "solady/=lib/solady/src/",
    "v4-core/=lib/v4-core/",
    "v4-periphery/=lib/v4-periphery/",
    "forge-std/=lib/forge-std/src/",
    # v4-periphery imports v4-core as "@uniswap/v4-core/"; pin it to the same top-level
    # lib/v4-core so PoolKey etc. are one type everywhere (agent 5 — flagged to overseer).
    "@uniswap/v4-core/=lib/v4-core/",
    "solmate/=lib/v4-core/lib/solmate/",
]

[lint]
# Frozen interface files (interfaces-v1) trip naming-style lints; they cannot be edited.
# `wordBank` immutable keeps its lowercase public-getter name deliberately.
exclude_lints = ["mixed-case-variable", "mixed-case-function", "screaming-snake-case-immutable"]

[fuzz]
runs = 512

[invariant]
runs = 128
depth = 64
fail_on_revert = false

[fmt]
# Generated by tools/gen_assets_sol.py — formatting is the generator's job.
ignore = ["test/utils/RendererAssets.sol"]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
